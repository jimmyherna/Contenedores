<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Geoespacial - UMG</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .form-container { 
            position: absolute; top: 20px; right: 20px; 
            z-index: 1000; background: white; padding: 20px; 
            border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.3);
            width: 250px;
        }
        input, select, button { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ecc71; }
        h3 { margin-top: 0; font-size: 16px; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="form-container" id="formulario">
        <h3>📍 Registrar Punto</h3>
        <input type="text" id="nombre" placeholder="Nombre del lugar">
        <input type="text" id="desc" placeholder="Descripción">
        <select id="cat">
            <option value="Salud">Salud</option>
            <option value="Gastronomía">Gastronomía</option>
            <option value="Cultural">Cultural</option>
            <option value="Servicio">Servicio</option>
        </select>
        <p style="font-size: 11px; color: #7f8c8d;">Haz clic en el mapa para capturar coordenadas</p>
        <input type="text" id="coords" readonly placeholder="Lat, Lon (clic en mapa)">
        <button onclick="guardarPunto()">Guardar en DB</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([14.48, -90.53], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var tempLat, tempLon;

        // Al hacer clic, solo capturamos las coordenadas y ponemos un marcador temporal
        var markerTemp;
        map.on('click', function(e) {
            tempLat = e.latlng.lat;
            tempLon = e.latlng.lng;
            document.getElementById('coords').value = tempLat.toFixed(5) + ", " + tempLon.toFixed(5);
            
            if(markerTemp) map.removeLayer(markerTemp);
            markerTemp = L.marker([tempLat, tempLon]).addTo(map);
        });

        function cargarPuntos() {
            fetch('/farmacias').then(r => r.json()).then(data => {
                data.forEach(p => {
                    L.marker([p.lat, p.lon]).addTo(map)
                     .bindPopup("<b>"+p.nombre+"</b><br>"+p.categoria+"<br>"+p.descripcion);
                });
            });
        }

        function guardarPunto() {
            const nombre = document.getElementById('nombre').value;
            const desc = document.getElementById('desc').value;
            const cat = document.getElementById('cat').value;

            if(!nombre || !tempLat) {
                alert("Por favor pon un nombre y haz clic en el mapa");
                return;
            }

            fetch('/registrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nombre: nombre, descripcion: desc, categoria: cat,
                    lat: tempLat, lon: tempLon
                })
            }).then(() => {
                alert("¡Punto guardado exitosamente!");
                location.reload();
            });
        }

        cargarPuntos();
    </script>
</body>
</html>
