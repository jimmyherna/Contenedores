<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Geoespacial - UMG</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .form-container { 
            position: absolute; top: 10px; right: 10px; 
            z-index: 1000; background: white; padding: 15px; 
            border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.3);
            width: 260px;
        }
        input, select, button { width: 100%; margin-bottom: 8px; padding: 8px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ecc71; }
        .search-box { border: 2px solid #007bff !important; background: #f0f7ff; font-weight: bold; }
        h3 { margin: 10px 0 5px 0; font-size: 14px; color: #2c3e50; border-bottom: 1px solid #eee; }
        .coord-label { color: #2980b9; font-size: 11px; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div class="form-container">
        <h3 style="color:#007bff">🔍 BUSCAR LUGAR</h3>
        <input type="text" id="busqueda" class="search-box" placeholder="Escribe nombre aquí..." onkeyup="buscarLugar()">
        
        <h3>📍 Registrar Punto</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="desc" placeholder="Descripción">
        <select id="cat">
            <option value="Salud">Salud</option>
            <option value="Gastronomía">Gastronomía</option>
            <option value="Cultural">Cultural</option>
            <option value="Servicio">Servicio</option>
        </select>
        <input type="text" id="coords" readonly placeholder="Clic en mapa para coordenadas">
        <button onclick="guardarPunto()">Guardar en DB</button>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([14.48, -90.53], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marcadores = [];
        var tempLat, tempLon, markerTemp;

        map.on('click', function(e) {
            tempLat = e.latlng.lat; tempLon = e.latlng.lng;
            document.getElementById('coords').value = tempLat.toFixed(5) + ", " + tempLon.toFixed(5);
            if(markerTemp) map.removeLayer(markerTemp);
            markerTemp = L.marker([tempLat, tempLon]).addTo(map);
        });

        function cargarPuntos() {
            fetch('/farmacias').then(r => r.json()).then(data => {
                data.forEach(p => {
                    var m = L.marker([p.lat, p.lon]).addTo(map)
                             .bindPopup("<b>"+p.nombre+"</b><br>"+(p.descripcion || "")+
                                        "<hr><span class='coord-label'>Coordenadas:</span><small>"+p.lat+", "+p.lon+"</small>");
                    m.nombreBusqueda = p.nombre.toLowerCase();
                    marcadores.push(m);
                });
            });
        }

        function buscarLugar() {
            var txt = document.getElementById('busqueda').value.toLowerCase();
            marcadores.forEach(m => {
                if(m.nombreBusqueda.includes(txt)) {
                    m.setOpacity(1);
                    if(txt.length > 2 && m.nombreBusqueda.includes(txt)) { map.panTo(m.getLatLng()); }
                } else { m.setOpacity(0.1); }
            });
        }

        function guardarPunto() {
            const nombre = document.getElementById('nombre').value;
            if(!nombre || !tempLat) return alert("Faltan datos");
            fetch('/registrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nombre, descripcion: document.getElementById('desc').value, categoria: document.getElementById('cat').value, lat: tempLat, lon: tempLon})
            }).then(() => location.reload());
        }
        cargarPuntos();
    </script>
</body>
</html>
